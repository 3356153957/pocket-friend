name: Deploy production

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pocket-friend-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: [self-hosted, linux, x64, pocket-friend-prod]
    timeout-minutes: 30
    env:
      PF_DEPLOY_ROOT: /srv/pocket-friend
      PF_DEPLOY_ENV_FILE: /etc/pocket-friend/mobile.env
      PF_DEPLOY_SERVICE: pocket-friend.service
      PF_DEPLOY_HEALTH_URL: http://127.0.0.1/
      PF_ADMIN_DEPLOY_ROOT: /srv/pocket-friend-admin
      PF_ADMIN_ENV_FILE: /etc/pocket-friend/admin.env
      PF_ADMIN_SERVICE: pocket-friend-admin.service
      PF_ADMIN_HEALTH_URL: http://127.0.0.1:4311/health
    steps:
      - name: Repair self-hosted workspace
        run: |
          echo "workspace=$GITHUB_WORKSPACE"
          echo "runner_temp=$RUNNER_TEMP"
          echo "user=$(id -u):$(id -g) $(whoami)"
          case "$GITHUB_WORKSPACE" in
            /opt/actions-runner/_work/pocket-friend/pocket-friend)
              cd "$RUNNER_TEMP" || true
              sudo chown -R "$(id -u):$(id -g)" "$(dirname "$GITHUB_WORKSPACE")" || true
              rm -rf "$GITHUB_WORKSPACE/.git" || true
              mkdir -p "$GITHUB_WORKSPACE"
              ;;
            *)
              echo "Refusing to repair unexpected workspace: $GITHUB_WORKSPACE" >&2
              exit 1
              ;;
          esac

      - name: Check out the triggering commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -c protocol.version=2 fetch --no-tags --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Build, publish, and verify production
        run: >-
          flock --exclusive --wait 1800
          /srv/pocket-friend/deploy.lock
          node scripts/deploy-production.mjs

      - name: Publish and verify device admin
        run: >-
          flock --exclusive --wait 1800
          /srv/pocket-friend/deploy.lock
          node scripts/deploy-admin.mjs
